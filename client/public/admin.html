<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Админ-панель — Храм Александра Невского</title>
<style>
:root{--primary:#4a148c;--primary-light:#7c43bd;--primary-dark:#12005e;--gold:#c8a415;--bg:#f5f3f0;--card:#fff;--text:#2c2c2c;--text-light:#666;--border:#e0d8cc;--danger:#c62828}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Georgia,serif;background:var(--bg);color:var(--text);line-height:1.6}
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.login-box{background:#fff;border-radius:8px;box-shadow:0 2px 12px #00000014;padding:40px;max-width:380px;width:100%}
.login-box h2{text-align:center;color:var(--primary-dark);margin-bottom:24px;font-size:1.3rem}
.login-box input{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:4px;font-size:1rem;margin-bottom:12px;font-family:inherit}
.login-box button{width:100%;padding:12px;background:var(--primary);color:#fff;border:none;border-radius:4px;font-size:1rem;cursor:pointer;font-family:inherit}
.login-box button:hover{background:var(--primary-light)}
.error{color:var(--danger);text-align:center;margin-bottom:12px;font-size:.9rem}
.layout{display:grid;grid-template-columns:240px 1fr;min-height:100vh}
.sidebar{background:var(--primary-dark);color:#fff;padding:20px 0}
.sidebar h3{border-bottom:1px solid #ffffff1a;padding:0 20px 16px;font-size:1rem}
.sidebar a{color:#ffffffb3;padding:10px 20px;font-size:.9rem;transition:all .2s;display:block;text-decoration:none;cursor:pointer}
.sidebar a:hover,.sidebar a.active{color:#fff;background:#ffffff1a}
.sidebar .logout{margin-top:auto;border-top:1px solid #ffffff1a;margin-top:20px}
.content{background:var(--bg);padding:24px 32px;overflow-y:auto}
.content h2{color:var(--primary-dark);margin-bottom:20px}
.card{background:var(--card);border:1px solid var(--border);border-radius:8px;box-shadow:0 2px 12px #00000014;padding:24px;margin-bottom:20px}
.card h3{color:var(--primary);margin-bottom:12px}
table{width:100%;border-collapse:collapse;background:#fff;border-radius:8px;overflow:hidden;box-shadow:0 2px 12px #00000014}
th,td{text-align:left;padding:12px 16px;border-bottom:1px solid var(--border);font-size:.9rem}
th{background:var(--primary);color:#fff;font-weight:500}
label{display:block;margin-bottom:4px;font-size:.9rem;font-weight:600}
input[type=text],input[type=password],input[type=url],input[type=date],input[type=number],textarea,select{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:4px;font-size:.95rem;font-family:inherit;margin-bottom:4px}
textarea{resize:vertical;min-height:100px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.form-group{margin-bottom:16px}
.btn{display:inline-block;padding:8px 20px;border:none;border-radius:4px;font-size:.9rem;cursor:pointer;font-family:inherit;transition:all .2s}
.btn-primary{background:var(--primary);color:#fff}.btn-primary:hover{background:var(--primary-light)}
.btn-danger{background:var(--danger);color:#fff}.btn-danger:hover{background:#e53935}
.btn-gold{background:var(--gold);color:#fff}
.btn-sm{padding:4px 12px;font-size:.8rem}
.mt8{margin-top:8px}.mb16{margin-bottom:16px}
.grid4{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-top:20px}
.grid4 .card{text-align:center;padding:24px;cursor:pointer}
.grid4 .card:hover{border-color:var(--primary)}
.grid4 h3{font-size:2rem;margin-bottom:8px}
.checkbox{display:flex;align-items:center;gap:6px;margin-bottom:16px}
.checkbox input{width:auto}
.empty{text-align:center;padding:32px;color:var(--text-light)}
.status{padding:2px 8px;border-radius:4px;font-size:.8rem;font-weight:600}
.status-on{background:#e8f5e9;color:#2e7d32}
.status-off{background:#ffebee;color:#c62828}
.mobile-hamburger{display:none!important;align-items:center;justify-content:center;width:40px;height:40px;background:var(--primary);color:#fff;border:none;cursor:pointer;font-size:1.3rem;position:fixed;top:8px;left:8px;z-index:1001;border-radius:4px}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:999}
.sidebar-overlay.open{display:block}
@media(max-width:768px){.layout{grid-template-columns:1fr}.sidebar{position:fixed;left:-260px;top:0;bottom:0;width:260px;z-index:1000;transition:left .3s}.sidebar.open{left:0}.mobile-hamburger{display:flex!important}.content{padding:16px;padding-top:56px}.form-row{grid-template-columns:1fr}}
</style>
</head>
<body>

<div id="login-page" class="login-wrap">
  <div class="login-box">
    <h2>&#128274; Вход в админ-панель</h2>
    <div id="login-error" class="error" style="display:none"></div>
    <form id="login-form">
      <input type="text" id="login-user" placeholder="Логин" required>
      <input type="password" id="login-pass" placeholder="Пароль" required>
      <button type="submit">Войти</button>
    </form>
  </div>
</div>

<div id="admin-page" class="layout" style="display:none">
  <button class="mobile-hamburger" onclick="document.querySelector('.sidebar').classList.toggle('open');document.querySelector('.sidebar-overlay').classList.toggle('open')">&#9776;</button>
  <div class="sidebar-overlay" onclick="document.querySelector('.sidebar').classList.remove('open');this.classList.remove('open')"></div>
  <div class="sidebar">
    <h3>&#9881; Админ-панель</h3>
    <a onclick="showSection('home')" id="nav-home" class="active">Главная</a>
    <a onclick="showSection('pages')" id="nav-pages">Страницы</a>
    <a onclick="showSection('schedule')" id="nav-schedule">Расписание</a>
    <a onclick="showSection('news')" id="nav-news">Новости</a>
    <a onclick="showSection('gallery')" id="nav-gallery">Галерея</a>
    <a onclick="showSection('announcements')" id="nav-announcements">Объявления</a>
    <a href="/" target="_blank">&#128269; На сайт</a>
    <a onclick="logout()" class="logout" style="cursor:pointer">&#128682; Выйти</a>
  </div>
  <div class="content" id="content-area"></div>
</div>

<script>
var API = '/api';
var token = localStorage.getItem('token');

function api(method, path, body) {
  var opts = { method: method, headers: { 'Content-Type': 'application/json' } };
  if (token) opts.headers['Authorization'] = 'Bearer ' + token;
  if (body) opts.body = JSON.stringify(body);
  return fetch(API + path, opts).then(function(r) {
    if (r.status === 401) { logout(); throw new Error('Unauthorized'); }
    if (!r.ok) throw new Error('Error ' + r.status);
    var ct = r.headers.get('content-type');
    if (ct && ct.indexOf('json') !== -1) return r.json();
    return r.text();
  });
}

// Auth
document.getElementById('login-form').onsubmit = function(e) {
  e.preventDefault();
  var u = document.getElementById('login-user').value;
  var p = document.getElementById('login-pass').value;
  api('POST', '/auth/login', { username: u, password: p })
    .then(function(d) {
      token = d.token;
      localStorage.setItem('token', d.token);
      localStorage.setItem('user', JSON.stringify(d));
      showAdmin();
    })
    .catch(function(err) {
      var el = document.getElementById('login-error');
      el.textContent = 'Неверное имя пользователя или пароль';
      el.style.display = 'block';
    });
};

function logout() {
  token = null;
  localStorage.removeItem('token');
  localStorage.removeItem('user');
  document.getElementById('login-page').style.display = '';
  document.getElementById('admin-page').style.display = 'none';
}

function showAdmin() {
  document.getElementById('login-page').style.display = 'none';
  document.getElementById('admin-page').style.display = '';
  showSection('home');
}

if (token) showAdmin();

// Navigation
var currentSection = '';
function showSection(name) {
  currentSection = name;
  document.querySelectorAll('.sidebar a').forEach(function(a) { a.classList.remove('active'); });
  var nav = document.getElementById('nav-' + name);
  if (nav) nav.classList.add('active');
  document.querySelector('.sidebar').classList.remove('open');
  document.querySelector('.sidebar-overlay').classList.remove('open');
  if (name === 'home') renderHome();
  else if (name === 'pages') renderPages();
  else if (name === 'schedule') renderSchedule();
  else if (name === 'news') renderNews();
  else if (name === 'gallery') renderGallery();
  else if (name === 'announcements') renderAnnouncements();
}

function esc(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

// Home
function renderHome() {
  document.getElementById('content-area').innerHTML =
    '<h2>Добро пожаловать в админ-панель</h2>' +
    '<div class="grid4">' +
    '<div class="card" onclick="showSection(\'pages\')"><h3>&#128196;</h3><p>Страницы</p></div>' +
    '<div class="card" onclick="showSection(\'schedule\')"><h3>&#128197;</h3><p>Расписание</p></div>' +
    '<div class="card" onclick="showSection(\'news\')"><h3>&#128240;</h3><p>Новости</p></div>' +
    '<div class="card" onclick="showSection(\'gallery\')"><h3>&#128247;</h3><p>Галерея</p></div>' +
    '<div class="card" onclick="showSection(\'announcements\')"><h3>&#128227;</h3><p>Объявления</p></div>' +
    '</div>';
}

// === PAGES ===
function renderPages() {
  api('GET', '/pages/all').then(function(pages) {
    var h = '<h2>Управление страницами</h2>' +
      '<div class="card"><h3>Новая страница</h3>' +
      '<form id="page-form" onsubmit="savePage(event)">' +
      '<div class="form-row">' +
      '<div class="form-group"><label>Slug (URL)</label><input type="text" id="pf-slug" required></div>' +
      '<div class="form-group"><label>Заголовок</label><input type="text" id="pf-title" required></div>' +
      '</div>' +
      '<div class="form-group"><label>Meta описание</label><input type="text" id="pf-meta"></div>' +
      '<div class="form-group"><label>Содержимое (HTML)</label><textarea id="pf-content" style="min-height:200px" required></textarea></div>' +
      '<div class="checkbox"><input type="checkbox" id="pf-published" checked><label for="pf-published">Опубликовано</label></div>' +
      '<div class="form-group"><label>Порядок</label><input type="number" id="pf-order" value="0" style="width:100px"></div>' +
      '<input type="hidden" id="pf-id">' +
      '<button type="submit" class="btn btn-primary">Создать</button>' +
      '<button type="button" class="btn" onclick="resetPageForm()" id="pf-cancel" style="display:none;margin-left:8px">Отмена</button>' +
      '</form></div>' +
      '<table><thead><tr><th>Slug</th><th>Заголовок</th><th>Статус</th><th>Действия</th></tr></thead><tbody>';
    pages.forEach(function(p) {
      h += '<tr><td>' + esc(p.slug) + '</td><td>' + esc(p.title) + '</td>' +
        '<td>' + (p.isPublished ? '<span class="status status-on">OK</span>' : '<span class="status status-off">Черновик</span>') + '</td>' +
        '<td><button class="btn btn-primary btn-sm" onclick="editPage(' + p.id + ')">Ред.</button> ' +
        '<button class="btn btn-danger btn-sm" onclick="deletePage(' + p.id + ')">Удал.</button></td></tr>';
    });
    h += '</tbody></table>';
    document.getElementById('content-area').innerHTML = h;
  });
}

function savePage(e) {
  e.preventDefault();
  var id = document.getElementById('pf-id').value;
  var data = {
    slug: document.getElementById('pf-slug').value,
    title: document.getElementById('pf-title').value,
    content: document.getElementById('pf-content').value,
    metaDescription: document.getElementById('pf-meta').value,
    isPublished: document.getElementById('pf-published').checked,
    sortOrder: parseInt(document.getElementById('pf-order').value) || 0
  };
  var pr = id ? api('PUT', '/pages/' + id, data) : api('POST', '/pages', data);
  pr.then(function() { resetPageForm(); renderPages(); }).catch(function() { alert('Ошибка сохранения'); });
}

function editPage(id) {
  api('GET', '/pages/all').then(function(pages) {
    var p = pages.find(function(x) { return x.id === id; });
    if (!p) return;
    document.getElementById('pf-id').value = p.id;
    document.getElementById('pf-slug').value = p.slug;
    document.getElementById('pf-title').value = p.title;
    document.getElementById('pf-content').value = p.content;
    document.getElementById('pf-meta').value = p.metaDescription || '';
    document.getElementById('pf-published').checked = p.isPublished;
    document.getElementById('pf-order').value = p.sortOrder || 0;
    document.getElementById('pf-cancel').style.display = '';
    window.scrollTo(0, 0);
  });
}

function resetPageForm() {
  document.getElementById('page-form').reset();
  document.getElementById('pf-id').value = '';
  document.getElementById('pf-cancel').style.display = 'none';
  document.getElementById('pf-published').checked = true;
}

function deletePage(id) {
  if (!confirm('Удалить страницу?')) return;
  api('DELETE', '/pages/' + id).then(function() { renderPages(); });
}

// === SCHEDULE ===
var DAY_NAMES = ['Воскресенье','Понедельник','Вторник','Среда','Четверг','Пятница','Суббота'];

function renderSchedule() {
  api('GET', '/events/all').then(function(events) {
    var h = '<h2>Расписание богослужений</h2>' +
      '<div class="card"><h3>Добавить богослужение</h3>' +
      '<form id="sched-form" onsubmit="saveSchedule(event)">' +
      '<div class="form-row">' +
      '<div class="form-group"><label>Название</label><input type="text" id="sf-title" placeholder="Вечерня, Литургия, Акафист..." required></div>' +
      '<div class="form-group"><label>День недели</label><select id="sf-day">' +
      '<option value="1">Понедельник</option>' +
      '<option value="2">Вторник</option>' +
      '<option value="3">Среда</option>' +
      '<option value="4">Четверг</option>' +
      '<option value="5" selected>Пятница</option>' +
      '<option value="6">Суббота</option>' +
      '<option value="0">Воскресенье</option>' +
      '</select></div>' +
      '</div>' +
      '<div class="form-row">' +
      '<div class="form-group"><label>Время</label><input type="text" id="sf-time" placeholder="17:00" required></div>' +
      '<div class="form-group"><label>Место</label><input type="text" id="sf-location" placeholder="Храм Александра Невского"></div>' +
      '</div>' +
      '<div class="form-group"><label>Описание</label><input type="text" id="sf-desc" placeholder="Вечернее богослужение"></div>' +
      '<div class="form-row">' +
      '<div class="checkbox"><input type="checkbox" id="sf-recurring" checked><label for="sf-recurring">Еженедельно</label></div>' +
      '<div class="checkbox"><input type="checkbox" id="sf-published" checked><label for="sf-published">Опубликовано</label></div>' +
      '</div>' +
      '<input type="hidden" id="sf-id">' +
      '<button type="submit" class="btn btn-primary">Добавить</button>' +
      '<button type="button" class="btn" onclick="resetSchedForm()" id="sf-cancel" style="display:none;margin-left:8px">Отмена</button>' +
      '</form></div>';

    if (events.length) {
      h += '<table><thead><tr><th>День</th><th>Время</th><th>Название</th><th>Описание</th><th>Статус</th><th>Действия</th></tr></thead><tbody>';
      events.forEach(function(ev) {
        h += '<tr><td>' + esc(DAY_NAMES[ev.dayOfWeek] || '—') + '</td><td>' + esc(ev.time || '—') + '</td>' +
          '<td><strong>' + esc(ev.title) + '</strong></td><td>' + esc(ev.description || '—') + '</td>' +
          '<td>' + (ev.isPublished ? '<span class="status status-on">OK</span>' : '<span class="status status-off">Скрыто</span>') + '</td>' +
          '<td><button class="btn btn-primary btn-sm" onclick="editSchedule(' + ev.id + ')">Ред.</button> ' +
          '<button class="btn btn-danger btn-sm" onclick="deleteSchedule(' + ev.id + ')">Удал.</button></td></tr>';
      });
      h += '</tbody></table>';
    } else {
      h += '<p class="empty">Расписание пусто. Добавьте первое богослужение выше.</p>';
    }
    document.getElementById('content-area').innerHTML = h;
  });
}

function saveSchedule(e) {
  e.preventDefault();
  var id = document.getElementById('sf-id').value;
  var data = {
    title: document.getElementById('sf-title').value,
    dayOfWeek: parseInt(document.getElementById('sf-day').value),
    time: document.getElementById('sf-time').value,
    description: document.getElementById('sf-desc').value || null,
    location: document.getElementById('sf-location').value || null,
    isRecurring: document.getElementById('sf-recurring').checked,
    isPublished: document.getElementById('sf-published').checked
  };
  var pr = id ? api('PUT', '/events/' + id, data) : api('POST', '/events', data);
  pr.then(function() { resetSchedForm(); renderSchedule(); }).catch(function() { alert('Ошибка сохранения'); });
}

function editSchedule(id) {
  api('GET', '/events/all').then(function(events) {
    var ev = events.find(function(x) { return x.id === id; });
    if (!ev) return;
    document.getElementById('sf-id').value = ev.id;
    document.getElementById('sf-title').value = ev.title;
    document.getElementById('sf-day').value = ev.dayOfWeek;
    document.getElementById('sf-time').value = ev.time || '';
    document.getElementById('sf-desc').value = ev.description || '';
    document.getElementById('sf-location').value = ev.location || '';
    document.getElementById('sf-recurring').checked = ev.isRecurring;
    document.getElementById('sf-published').checked = ev.isPublished;
    document.getElementById('sf-cancel').style.display = '';
    window.scrollTo(0, 0);
  });
}

function resetSchedForm() {
  document.getElementById('sched-form').reset();
  document.getElementById('sf-id').value = '';
  document.getElementById('sf-cancel').style.display = 'none';
  document.getElementById('sf-day').value = '5';
  document.getElementById('sf-recurring').checked = true;
  document.getElementById('sf-published').checked = true;
}

function deleteSchedule(id) {
  if (!confirm('Удалить богослужение из расписания?')) return;
  api('DELETE', '/events/' + id).then(function() { renderSchedule(); });
}

// === NEWS ===
function renderNews() {
  api('GET', '/news/all').then(function(items) {
    var h = '<h2>Управление новостями</h2>' +
      '<div class="card"><h3>Новая новость</h3>' +
      '<form id="news-form" onsubmit="saveNews(event)">' +
      '<div class="form-group"><label>Заголовок</label><input type="text" id="nf-title" required></div>' +
      '<div class="form-group"><label>Краткое описание</label><textarea id="nf-summary" style="min-height:60px" required></textarea></div>' +
      '<div class="form-group"><label>Содержимое (HTML)</label><textarea id="nf-content" style="min-height:150px" required></textarea></div>' +
      '<div class="form-row">' +
      '<div class="form-group"><label>URL изображения</label><input type="url" id="nf-image"></div>' +
      '<div class="form-group"><label>Дата публикации</label><input type="date" id="nf-date"></div>' +
      '</div>' +
      '<div class="checkbox"><input type="checkbox" id="nf-published" checked><label for="nf-published">Опубликовано</label></div>' +
      '<div class="checkbox"><input type="checkbox" id="nf-featured"><label for="nf-featured">Важное</label></div>' +
      '<input type="hidden" id="nf-id">' +
      '<button type="submit" class="btn btn-primary">Создать</button>' +
      '<button type="button" class="btn" onclick="resetNewsForm()" id="nf-cancel" style="display:none;margin-left:8px">Отмена</button>' +
      '</form></div>' +
      '<table><thead><tr><th>Заголовок</th><th>Дата</th><th>Важное</th><th>Статус</th><th>Действия</th></tr></thead><tbody>';
    items.forEach(function(n) {
      h += '<tr><td>' + esc(n.title) + '</td><td>' + new Date(n.publishedAt).toLocaleDateString('ru-RU') + '</td>' +
        '<td>' + (n.isFeatured ? '&#11088;' : '') + '</td>' +
        '<td>' + (n.isPublished ? '<span class="status status-on">OK</span>' : '<span class="status status-off">Черновик</span>') + '</td>' +
        '<td><button class="btn btn-primary btn-sm" onclick="editNews(' + n.id + ')">Ред.</button> ' +
        '<button class="btn btn-danger btn-sm" onclick="deleteNews(' + n.id + ')">Удал.</button></td></tr>';
    });
    h += '</tbody></table>';
    document.getElementById('content-area').innerHTML = h;
  });
}

function saveNews(e) {
  e.preventDefault();
  var id = document.getElementById('nf-id').value;
  var data = {
    title: document.getElementById('nf-title').value,
    summary: document.getElementById('nf-summary').value,
    content: document.getElementById('nf-content').value,
    imageUrl: document.getElementById('nf-image').value || null,
    publishedAt: document.getElementById('nf-date').value ? new Date(document.getElementById('nf-date').value).toISOString() : new Date().toISOString(),
    isPublished: document.getElementById('nf-published').checked,
    isFeatured: document.getElementById('nf-featured').checked
  };
  var pr = id ? api('PUT', '/news/' + id, data) : api('POST', '/news', data);
  pr.then(function() { resetNewsForm(); renderNews(); }).catch(function() { alert('Ошибка сохранения'); });
}

function editNews(id) {
  api('GET', '/news/all').then(function(items) {
    var n = items.find(function(x) { return x.id === id; });
    if (!n) return;
    document.getElementById('nf-id').value = n.id;
    document.getElementById('nf-title').value = n.title;
    document.getElementById('nf-summary').value = n.summary;
    document.getElementById('nf-content').value = n.content;
    document.getElementById('nf-image').value = n.imageUrl || '';
    document.getElementById('nf-date').value = n.publishedAt ? n.publishedAt.split('T')[0] : '';
    document.getElementById('nf-published').checked = n.isPublished;
    document.getElementById('nf-featured').checked = n.isFeatured;
    document.getElementById('nf-cancel').style.display = '';
    window.scrollTo(0, 0);
  });
}

function resetNewsForm() {
  document.getElementById('news-form').reset();
  document.getElementById('nf-id').value = '';
  document.getElementById('nf-cancel').style.display = 'none';
  document.getElementById('nf-published').checked = true;
}

function deleteNews(id) {
  if (!confirm('Удалить новость?')) return;
  api('DELETE', '/news/' + id).then(function() { renderNews(); });
}

// === GALLERY ===
var galleryTab = 'photos';
function renderGallery() {
  var h = '<h2>Управление галереей</h2>' +
    '<div style="display:flex;gap:8px;margin-bottom:20px">' +
    '<button class="btn ' + (galleryTab === 'photos' ? 'btn-primary' : '') + '" onclick="galleryTab=\'photos\';renderGallery()">Фото</button>' +
    '<button class="btn ' + (galleryTab === 'videos' ? 'btn-primary' : '') + '" onclick="galleryTab=\'videos\';renderGallery()">Видео</button>' +
    '</div>';
  document.getElementById('content-area').innerHTML = h;
  if (galleryTab === 'photos') renderPhotos();
  else renderVideos();
}

function renderPhotos() {
  api('GET', '/gallery/photos').then(function(photos) {
    var h = '<div class="card"><h3>Добавить фото</h3>' +
      '<form onsubmit="addPhoto(event)">' +
      '<div class="form-row">' +
      '<div class="form-group"><label>Название</label><input type="text" id="photo-title" required></div>' +
      '<div class="form-group"><label>URL изображения</label><input type="url" id="photo-url" required></div>' +
      '</div>' +
      '<div class="form-row">' +
      '<div class="form-group"><label>Описание</label><input type="text" id="photo-desc"></div>' +
      '<div class="form-group"><label>Категория</label><input type="text" id="photo-cat"></div>' +
      '</div>' +
      '<button type="submit" class="btn btn-primary">Добавить</button></form></div>';
    if (photos.length) {
      h += '<table><thead><tr><th>Название</th><th>Категория</th><th>Действия</th></tr></thead><tbody>';
      photos.forEach(function(p) {
        h += '<tr><td>' + esc(p.title) + '</td><td>' + esc(p.category || '—') + '</td>' +
          '<td><button class="btn btn-danger btn-sm" onclick="deletePhoto(' + p.id + ')">Удал.</button></td></tr>';
      });
      h += '</tbody></table>';
    } else h += '<p class="empty">Фотографий пока нет.</p>';
    document.getElementById('content-area').innerHTML += h;
  });
}

function addPhoto(e) {
  e.preventDefault();
  api('POST', '/gallery/photos', {
    title: document.getElementById('photo-title').value,
    url: document.getElementById('photo-url').value,
    description: document.getElementById('photo-desc').value || null,
    category: document.getElementById('photo-cat').value || null
  }).then(function() { renderGallery(); });
}

function deletePhoto(id) {
  if (!confirm('Удалить фото?')) return;
  api('DELETE', '/gallery/photos/' + id).then(function() { renderGallery(); });
}

function renderVideos() {
  api('GET', '/gallery/videos').then(function(videos) {
    var h = '<div class="card"><h3>Добавить видео</h3>' +
      '<form onsubmit="addVideo(event)">' +
      '<div class="form-group"><label>Название</label><input type="text" id="vid-title" required></div>' +
      '<div class="form-group"><label>URL видео (YouTube embed)</label><input type="url" id="vid-url" required placeholder="https://www.youtube.com/embed/..."></div>' +
      '<div class="form-group"><label>Описание</label><input type="text" id="vid-desc"></div>' +
      '<button type="submit" class="btn btn-primary">Добавить</button></form></div>';
    if (videos.length) {
      h += '<table><thead><tr><th>Название</th><th>URL</th><th>Действия</th></tr></thead><tbody>';
      videos.forEach(function(v) {
        h += '<tr><td>' + esc(v.title) + '</td><td style="max-width:300px;overflow:hidden;text-overflow:ellipsis">' + esc(v.videoUrl) + '</td>' +
          '<td><button class="btn btn-danger btn-sm" onclick="deleteVideo(' + v.id + ')">Удал.</button></td></tr>';
      });
      h += '</tbody></table>';
    } else h += '<p class="empty">Видео пока нет.</p>';
    document.getElementById('content-area').innerHTML += h;
  });
}

function addVideo(e) {
  e.preventDefault();
  api('POST', '/gallery/videos', {
    title: document.getElementById('vid-title').value,
    videoUrl: document.getElementById('vid-url').value,
    description: document.getElementById('vid-desc').value || null
  }).then(function() { renderGallery(); });
}

function deleteVideo(id) {
  if (!confirm('Удалить видео?')) return;
  api('DELETE', '/gallery/videos/' + id).then(function() { renderGallery(); });
}

// === ANNOUNCEMENTS ===
function renderAnnouncements() {
  api('GET', '/announcements').then(function(items) {
    var h = '<h2>Управление объявлениями</h2>' +
      '<div class="card"><h3>Новое объявление</h3>' +
      '<form onsubmit="addAnnouncement(event)">' +
      '<div class="form-group"><label>Заголовок</label><input type="text" id="ann-title" required></div>' +
      '<div class="form-group"><label>Текст</label><textarea id="ann-content" required></textarea></div>' +
      '<div class="form-row">' +
      '<div class="form-group"><label>Ссылка (URL)</label><input type="url" id="ann-url"></div>' +
      '<div class="form-group"><label>Текст ссылки</label><input type="text" id="ann-linktext"></div>' +
      '</div>' +
      '<div class="checkbox"><input type="checkbox" id="ann-active" checked><label for="ann-active">Активно</label></div>' +
      '<button type="submit" class="btn btn-primary">Добавить</button></form></div>';
    if (items.length) {
      h += '<table><thead><tr><th>Заголовок</th><th>Ссылка</th><th>Активно</th><th>Действия</th></tr></thead><tbody>';
      items.forEach(function(a) {
        h += '<tr><td>' + esc(a.title) + '</td>' +
          '<td>' + (a.linkUrl ? '<a href="' + esc(a.linkUrl) + '" target="_blank">' + esc(a.linkText || a.linkUrl) + '</a>' : '—') + '</td>' +
          '<td>' + (a.isActive ? '<span class="status status-on">OK</span>' : '<span class="status status-off">Выкл</span>') + '</td>' +
          '<td><button class="btn btn-danger btn-sm" onclick="deleteAnnouncement(' + a.id + ')">Удал.</button></td></tr>';
      });
      h += '</tbody></table>';
    } else h += '<p class="empty">Объявлений пока нет.</p>';
    document.getElementById('content-area').innerHTML += h;
  });
}

function addAnnouncement(e) {
  e.preventDefault();
  api('POST', '/announcements', {
    title: document.getElementById('ann-title').value,
    content: document.getElementById('ann-content').value,
    linkUrl: document.getElementById('ann-url').value || null,
    linkText: document.getElementById('ann-linktext').value || null,
    isActive: document.getElementById('ann-active').checked
  }).then(function() { renderAnnouncements(); });
}

function deleteAnnouncement(id) {
  if (!confirm('Удалить объявление?')) return;
  api('DELETE', '/announcements/' + id).then(function() { renderAnnouncements(); });
}
</script>
</body>
</html>
