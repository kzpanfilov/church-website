services:
  - type: web
    name: church-website
    runtime: docker
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: church-db
          property: connectionString
      - key: Jwt__Key
        generateValue: true
      - key: Jwt__Issuer
        value: ChurchWebsite
      - key: Jwt__Audience
        value: ChurchWebsite

  - type: pgsql
    name: church-db
    plan: free
    databaseName: church
